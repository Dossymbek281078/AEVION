<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AEVION CyberChess">
  <title>AEVION CyberChess</title>
  <defs>
    <radialGradient id="cc-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#10b981" stop-opacity="0.40"/>
      <stop offset="75%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cc-knight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="60%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="cc-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background rounded rect (radius scaled: 80/512 ≈ 15.6%) -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="#0a0e1a"/>

  <!-- Inner subtle border for definition (inside safe zone) -->
  <rect x="8" y="8" width="496" height="496" rx="74" ry="74" fill="none" stroke="rgba(16,185,129,0.18)" stroke-width="2"/>

  <!-- Radial green glow centered (safe-zone 80% → r ≈ 205) -->
  <circle cx="256" cy="256" r="205" fill="url(#cc-glow)"/>

  <!-- Soft inner halo behind knight -->
  <circle cx="256" cy="270" r="120" fill="rgba(16,185,129,0.18)" filter="url(#cc-soft)"/>

  <!-- Knight glyph, vector silhouette (centered in 80% safe-zone ~ 51..461) -->
  <!-- Designed to fit in a 320x320 area centered at (256, 256) -->
  <g transform="translate(96,96) scale(0.625)">
    <!-- 'Knight' silhouette path, single fill, classical staunton-ish -->
    <path
      fill="url(#cc-knight)"
      stroke="#064e3b"
      stroke-width="6"
      stroke-linejoin="round"
      d="M256 60
         c-22 0 -42 8 -58 22
         c-8 7 -14 16 -18 26
         l-6 16
         c-4 10 -12 18 -22 22
         l-30 12
         c-14 6 -24 18 -28 32
         l-6 22
         c-2 8 0 16 6 22
         l14 14
         c6 6 14 8 22 6
         l30 -8
         c10 -2 20 0 28 6
         l10 8
         c4 4 6 10 4 16
         l-8 26
         c-4 12 -12 22 -22 28
         l-30 18
         c-12 8 -20 20 -22 34
         l-6 38
         c-2 12 4 24 14 30
         l8 4
         c4 2 8 6 8 10
         v18
         c0 8 6 14 14 14
         h270
         c8 0 14 -6 14 -14
         v-30
         c0 -38 -10 -74 -28 -106
         l-22 -38
         c-8 -14 -12 -30 -10 -46
         l8 -64
         c4 -32 -2 -64 -18 -92
         c-16 -28 -42 -48 -72 -56
         c-12 -4 -24 -6 -36 -6
         z
         M180 192
         c-10 0 -18 8 -18 18
         c0 10 8 18 18 18
         c10 0 18 -8 18 -18
         c0 -10 -8 -18 -18 -18
         z"
    />
    <!-- Mane accent stroke -->
    <path
      fill="none"
      stroke="#064e3b"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M300 110
         c20 18 32 44 36 72
         l4 36"
      opacity="0.5"
    />
    <!-- Subtle highlight on forehead -->
    <path
      fill="rgba(255,255,255,0.18)"
      d="M232 110
         c10 -10 28 -16 44 -14
         c12 2 22 8 30 18
         c-10 -2 -22 -2 -34 0
         c-14 4 -28 10 -40 18
         z"
    />
  </g>

  <!-- Subtle bottom shadow base under knight -->
  <ellipse cx="256" cy="430" rx="120" ry="14" fill="rgba(0,0,0,0.45)" filter="url(#cc-soft)"/>
</svg>
