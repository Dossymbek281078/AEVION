# V6-M CI for native mobile SDKs.
#
# I (Claude) wrote ~600 LOC of Swift + Kotlin without local toolchains
# (Windows host, no Xcode/Gradle). This workflow catches build/test
# failures that I couldn't surface during development.
#
# Triggers only on PRs and pushes that actually touch the mobile SDK
# directories so unrelated work doesn't pay the macOS runner tax.

name: Mobile SDKs

on:
  push:
    branches: [main, master, develop]
    paths:
      - "packages/qcoreai-swift/**"
      - "packages/qcoreai-kotlin/**"
      - ".github/workflows/mobile-sdks.yml"
  pull_request:
    paths:
      - "packages/qcoreai-swift/**"
      - "packages/qcoreai-kotlin/**"
      - ".github/workflows/mobile-sdks.yml"
  workflow_dispatch:

jobs:
  swift:
    name: Swift Package (build + test)
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/qcoreai-swift
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift toolchain
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test

  kotlin:
    name: Kotlin module (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qcoreai-kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
      - name: Build
        run: gradle build --no-daemon --stacktrace
      - name: Test
        run: gradle test --no-daemon --stacktrace
