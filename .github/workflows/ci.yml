# Быстрый gate: обе части стека собираются без ручных переключений папок.
name: CI

on:
  push:
    branches: [main, master, develop, aec-exchange]
  pull_request:
    branches: [main, master, develop, aec-exchange]

jobs:
  backend:
    name: Backend (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aevion-globus-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aevion-globus-backend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run test:run
      - run: npm run build
