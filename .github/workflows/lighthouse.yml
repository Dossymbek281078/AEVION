name: Lighthouse CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"  # weekly Mon 05:00 UTC
  push:
    branches: [main, master]
    paths:
      - "frontend/src/**"
      - "frontend/next.config.ts"
      - ".github/workflows/lighthouse.yml"

jobs:
  lhci:
    name: Lighthouse — perf / a11y / best-practices / seo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Start Next prod server
        run: |
          (npx next start -p 3100 &) && \
          npx wait-on http://127.0.0.1:3100 --timeout 60000
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:3100/aev
            http://127.0.0.1:3100/qtrade
            http://127.0.0.1:3100/aev/tokenomics
          configPath: ./frontend/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
